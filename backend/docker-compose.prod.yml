services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-soc-platform-backend:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-soc-platform-backend:prod
    restart: unless-stopped
    env_file:
      - .env
    command:
      [
        "sh",
        "-c",
        "exec celery -A app.workers.celery_app.celery_app worker --loglevel=\"$$(printf '%s' \"$${LOG_LEVEL:-INFO}\" | tr '[:upper:]' '[:lower:]')\" --concurrency=\"$${CELERY_WORKER_CONCURRENCY:-4}\" -Q \"$${CELERY_TASK_DEFAULT_QUEUE:-alert-processing}\"",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app.celery_app inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://127.0.0.1}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_DEMO_ADMIN_EMAIL: ${VITE_DEMO_ADMIN_EMAIL:-demo.admin@aisoc.dev}
        VITE_DEMO_ADMIN_PASSWORD: ${VITE_DEMO_ADMIN_PASSWORD:-DemoAdmin123!}
        VITE_DEMO_COLLECTOR_TOKEN: ${VITE_DEMO_COLLECTOR_TOKEN:-demo-collector-token}
    image: ai-soc-platform-frontend:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - internal

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE}
    command: ["mongod", "--auth", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --port 27017 -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file:
      - .env
    command:
      [
        "sh",
        "-c",
        "exec redis-server --bind 0.0.0.0 --protected-mode yes --appendonly yes --appendfsync everysec --save 900 1 --save 300 10 --save 60 10000 --maxmemory-policy noeviction --requirepass \"$${REDIS_PASSWORD}\"",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: ai-soc-platform-nginx:prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1/nginx-health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - internal

volumes:
  mongo_data:
  redis_data:

networks:
  internal:
    driver: bridge
